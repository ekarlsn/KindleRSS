Settings:
  max_history: 7 # Keep articles from the last N days (0 = no limit)
  load_images: true # Download and embed images in the EPUB
  # Available placeholders:
  # {year}, {month}, {day}, {hour}, {minute}, {second}
  # {date}     - Date           (2025-07-04)
  # {time}     - Time           (14:30)
  # {datetime} - Date and time  (2025-07-04_14-30)

Feeds:
  # Minimal entry — trafilatura is used by default
  - url: "https://example.com/feed.xml"
    title: "Example Blog"

  # Disable a feed without removing it.
  - url: "https://example.com/other.xml"
    title: "Paused Feed"
    enabled: false

  # Explicit trafilatura (same as the default).
  - url: "https://example.com/trafilatura-site/feed.xml"
    title: "Trafilatura Site"
    resolve_link:
      method: "trafilatura"

  # readability — strips aggressively, may drop link-heavy lists.
  - url: "https://example.com/readability-site/feed.xml"
    title: "Readability Site"
    resolve_link:
      method: "readability"

  # CSS selector — most reliable when you know the site's HTML structure.
  - url: "https://example.com/selector-site/feed.xml"
    title: "Selector Site"
    resolve_link:
      method: "selector"
      selectors:
        content: "article, .post-content, main"
        remove: ".ads, .comments, script, style"

  # Disable link resolution entirely — use the RSS summary as-is.
  - url: "https://example.com/summary-only/feed.xml"
    title: "Summary Only Feed"
    resolve_link: false
