Settings:
  max_history: 7 # Keep articles from the last 7 days
  load_images: true # Whether to download images
  filename_template: "RSS_Feed_{date}.epub" # Custom filename template
  # Available placeholders:
  # {year}     - Year (2025)
  # {month}    - Month (07)
  # {day}      - Day (04)
  # {hour}     - Hour (14)
  # {minute}   - Minute (30)
  # {second}   - Second (45)
  # {date}     - Date (2025-07-04)
  # {time}     - Time (14:30)
  # {datetime} - Date and time (2025-07-04_14-30)
  # Example: "RSS_Digest_{date}.epub" → "RSS_Digest_2025-07-04.epub"

Feeds:
  # Example 1: Extract content using CSS selectors
  - url: "https://sspai.com/feed"
    name: "SSPAI"
    title: "SSPAI Selected"
    enabled: true
    resolve_link:
      enabled: true
      method: "selector" # Use selectors first
      selectors:
        content: "article, .post-content, .article-content, main" # Content selectors
        remove: ".ads, .comments, .related-posts, script, style" # Elements to remove
      fallback: "readability" # Fall back to readability if selectors fail

  # Example 2: Use readability for automatic extraction
  - url: "https://feeds.feedburner.com/oreilly/radar"
    name: "O'Reilly Radar"
    title: "O'Reilly Radar"
    enabled: true
    resolve_link:
      enabled: true
      method: "readability" # Use readability directly

  # Example 3: No link resolution, use RSS summary as-is
  - url: "https://www.v2ex.com/index.xml"
    name: "V2EX"
    title: "V2EX Hot"
    enabled: true
    # No resolve_link config — uses the default RSS content
