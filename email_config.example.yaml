# Email configuration example
# Copy this file to email_config.yaml and fill in your actual details

# SMTP server settings
smtp_server: "smtp.gmail.com" # SMTP server address
smtp_port: 587 # 587 for STARTTLS, 465 for SSL

# Sender details
sender_email: "your_email@gmail.com" # Your email address
sender_password: "your_app_password" # Email password or app-specific password

# Kindle receiving email
kindle_email: "your_kindle@kindle.com" # Your Kindle email address

# Email subject and body (optional)
subject: "RSS Feed" # Email subject
body: "Your RSS feed digest" # Email body

# ====== Common SMTP settings reference ======
#
# Gmail:
#   smtp_server: smtp.gmail.com
#   smtp_port: 587
#   Note: Requires 2-factor authentication and an app-specific password
#
# QQ Mail:
#   smtp_server: smtp.qq.com
#   smtp_port: 587
#   Note: Use the authorization code, not your QQ password
#
# 163 Mail:
#   smtp_server: smtp.163.com
#   smtp_port: 465
#   Note: Use the authorization code
#
# Outlook:
#   smtp_server: smtp-mail.outlook.com
#   smtp_port: 587
